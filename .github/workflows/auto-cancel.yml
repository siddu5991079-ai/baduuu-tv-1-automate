name: Global Kill Switch (3:30 AM PKT)

on:
  schedule:
    # 3:30 AM PKT = 22:30 UTC
    - cron: '30 22 * * *'
  workflow_dispatch: # Manual test ka button

permissions:
  actions: write

jobs:
  cancel-all-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Stop Everything
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[*] Triggering Global Kill Switch..."
          
          # Get all currently running workflow runs
          RUNS=$(gh run list --status in_progress --json databaseId -q ".[].databaseId")
          
          if [ -z "$RUNS" ]; then
            echo "[+] Koi workflow running nahi hai. Sab theek hai."
            exit 0
          fi

          echo "$RUNS" | while read -r RUN_ID; do
            echo "[!] Cancelling Workflow Run ID: $RUN_ID"
            gh run cancel "$RUN_ID" || true
          done
          
          echo "[+] Sab band ho gaya hai. System Sleeping."
